<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2d34"/>
      <stop offset="50%" style="stop-color:#141518"/>
      <stop offset="100%" style="stop-color:#08090a"/>
    </linearGradient>
    <linearGradient id="baseEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="baseShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="20" dy="40" stdDeviation="30" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="letterShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-15" dy="25" stdDeviation="20" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <!-- Grid pattern for high-tech background feel -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="112" y="112" width="800" height="800" rx="220" fill="url(#bgGrad)" filter="url(#baseShadow)"/>
  <rect x="112" y="112" width="800" height="800" rx="220" fill="url(#grid)"/>
  <rect x="114" y="114" width="796" height="796" rx="218" fill="none" stroke="url(#baseEdge)" stroke-width="4"/>

